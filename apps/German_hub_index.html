function normalizeGerman(str){
  return (str || "")
    .toLowerCase()
    .replace(/ä/g,"ae").replace(/ö/g,"oe")
    .replace(/ü/g,"ue").replace(/ß/g,"ss")
    .replace(/\s+/g,"").trim();
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  if(!text) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function updateLetterVisual(letter){
  const info = letterInfo[letter];
  germanLetterEl.textContent = letter;
  englishLetterEl.textContent = info.en;
  letterPhoneticEl.textContent = "“" + info.phon + "”";

  // SVG stroke
  if(letterSVG){
    letterSVG.setAttribute("viewBox","0 0 200 200");
    const pathData = letterPaths[letter] || "";
    letterSVG.innerHTML = pathData ? "<path d='" + pathData + "' />" : "";
    const path = letterSVG.querySelector("path");
    if(path){
      path.style.strokeDasharray = 1000;
      path.style.strokeDashoffset = 1000;
      setTimeout(()=>{ path.style.strokeDashoffset = 0; },50);
    }
  }

  // Canvas guide
  drawGuideLetter(letter);
}

let drawing = false;
let lastX = 0;
let lastY = 0;

function drawGuideLetter(letter){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.globalAlpha = 0.15;
  ctx.font = "200px Segoe UI";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#000";
  ctx.fillText(letter, canvas.width/2, canvas.height/2);
  ctx.globalAlpha = 1;
}

function startDraw(x,y){
  drawing = true;
  lastX = x;
  lastY = y;
}

function drawStroke(x,y){
  if(!drawing) return;
  ctx.strokeStyle = "#dd0000";
  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
  ctx.lineTo(x,y);
  ctx.stroke();
  lastX = x;
  lastY = y;
}

function stopDraw(){
  drawing = false;
}

function resetTrace(){
  const letter = letters[currentLetterIndex];
  drawGuideLetter(letter);
}

canvas.addEventListener("mousedown",e=>{
  startDraw(e.offsetX,e.offsetY);
});
canvas.addEventListener("mousemove",e=>{
  drawStroke(e.offsetX,e.offsetY);
});
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",e=>{
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  startDraw(t.clientX-r.left,t.clientY-r.top);
});
canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  drawStroke(t.clientX-r.left,t.clientY-r.top);
});
canvas.addEventListener("touchend",stopDraw);

function drawLetter(){
  const letter = letters[currentLetterIndex];
  updateLetterVisual(letter);
  localStorage.setItem("de_currentLetterIndex", String(currentLetterIndex));
}
function nextLetter(){
  currentLetterIndex = (currentLetterIndex + 1) % letters.length;
  drawLetter();
}
function prevLetter(){
  currentLetterIndex = (currentLetterIndex - 1 + letters.length) % letters.length;
  drawLetter();
}
function speakLetter(){
  const letter = letters[currentLetterIndex];
  const info = letterInfo[letter];
  speak(info.phon || letter);
}
function playAlphabet(){
  const seq = letters.map(l => letterInfo[l].phon || l).join(", ");
  speak(seq);
}

/* =====================
   GAME
   ===================== */
let streak = +localStorage.getItem("streak") || 0;
let best   = +localStorage.getItem("best")   || 0;
let correct= +localStorage.getItem("correct")|| 0;
let total  = +localStorage.getItem("total")  || 0;
let currentWord = null;

function getFiltered(){
  return WORDS.filter(w =>
    (filterEl.value === "all" || w.type === filterEl.value) &&
    (levelEl.value === "all" || w.level === levelEl.value)
  );
}

function renderChoices(){
  choiceAreaEl.innerHTML = "";
  const opts = [currentWord.german];
  while(opts.length < 4){
    const rand = WORDS[Math.floor(Math.random()*WORDS.length)].german;
    if(!opts.includes(rand)) opts.push(rand);
  }
  opts.sort(()=>Math.random()-0.5);
  opts.forEach(o=>{
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = o;
    b.onclick = ()=>{ answerEl.value = o; check(); };
    choiceAreaEl.appendChild(b);
  });
}

function nextWord(){
  const pool = getFiltered();
  if(!pool.length) return;
  currentWord = pool[Math.floor(Math.random()*pool.length)];
  promptEl.textContent = "Translate: " + currentWord.english;
  feedbackEl.textContent = "";
  answerEl.value = "";
  if(modeEl.value === "choice") renderChoices();
  typingAreaEl.style.display = (modeEl.value === "typing" ? "flex" : "none");
  choiceAreaEl.style.display = (modeEl.value === "choice" ? "flex" : "none");
  speak(currentWord.german);
}

function saveStats(){
  localStorage.setItem("streak", streak);
  localStorage.setItem("best",   best);
  localStorage.setItem("correct",correct);
  localStorage.setItem("total",  total);
}
function updateStats(){
  streakEl.textContent = streak;
  bestEl.textContent   = best;
  accuracyEl.textContent = total ? Math.round(correct/total*100) + "%" : "0%";
}

function check(){
  total++;
  if(normalizeGerman(answerEl.value) === normalizeGerman(currentWord.german)){
    streak++;
    correct++;
    if(streak > best) best = streak;
    feedbackEl.textContent = "✅ Correct!";
    saveStats(); updateStats();
    setTimeout(nextWord,800);
  }else{
    streak = 0;
    feedbackEl.textContent = "❌ " + currentWord.german;
    saveStats(); updateStats();
  }
}

/* =====================
   VERB CONJUGATION
   ===================== */
let currentVerb = null;
function newVerb(){
  const keys = Object.keys(VERBS);
  if(!keys.length) return;
  currentVerb = keys[Math.floor(Math.random()*keys.length)];
  verbPromptEl.textContent = "Conjugate: " + currentVerb;
  verbAnswerEl.value = "";
  verbFeedbackEl.textContent = "";
}
function checkVerb(){
  if(!currentVerb) return;
  const person = verbPersonEl.value;
  const target = VERBS[currentVerb][person];
  if(!target){
    verbFeedbackEl.textContent = "No data for this person yet.";
    return;
  }
  if(normalizeGerman(verbAnswerEl.value) === normalizeGerman(target)){
    verbFeedbackEl.textContent = "✅ Correct!";
  }else{
    verbFeedbackEl.textContent = "❌ " + person + " " + target;
  }
}

/* =====================
   SENTENCE BUILDER
   ===================== */
let currentSentence = null;
let built = [];

function newSentence(){
  if(!SENTENCES.length) return;
  currentSentence = SENTENCES[Math.floor(Math.random()*SENTENCES.length)];
  built = [];
  sentencePromptEl.textContent = 'Build: "' + currentSentence.english + '"';
  sentenceResultEl.textContent = "";
  sentenceChoicesEl.innerHTML = "";

  const pieces = currentSentence.german.slice().sort(()=>Math.random()-0.5);
  pieces.forEach(word=>{
    const b = document.createElement("button");
    b.textContent = word;
    b.onclick = ()=>{
      built.push(word);
      sentenceResultEl.textContent = built.join(" ");
      if(built.length === currentSentence.german.length){
        const builtStr = built.join(" ");
        const targetStr = currentSentence.german.join(" ");
        if(normalizeGerman(builtStr) === normalizeGerman(targetStr)){
          sentenceResultEl.textContent = "✅ " + targetStr;
        }else{
          sentenceResultEl.textContent = "❌ " + targetStr;
        }
      }
    };
    sentenceChoicesEl.appendChild(b);
  });
}

/* =====================
   EXPORT / IMPORT
   ===================== */
function exportProgress(){
  const data = {
    streak,
    best,
    correct,
    total,
    letterIndex: currentLetterIndex
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="german-progress.json";
  a.click();
}
function importProgress(){
  const i=document.createElement("input");
  i.type="file"; i.accept=".json,application/json";
  i.onchange=e=>{
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data = JSON.parse(r.result);
        if(typeof data.streak === "number") streak = data.streak;
        if(typeof data.best === "number") best = data.best;
        if(typeof data.correct === "number") correct = data.correct;
        if(typeof data.total === "number") total = data.total;
        if(typeof data.letterIndex === "number"){
          currentLetterIndex = Math.max(0, Math.min(letters.length-1, data.letterIndex));
        }
        saveStats();
        updateStats();
        drawLetter();
      }catch(err){
        alert("Could not read progress file.");
      }
    };
    r.readAsText(file);
  };
  i.click();
}

/* =====================
   EVENT WIRING & INIT
   ===================== */
modeEl.addEventListener("change", nextWord);
filterEl.addEventListener("change", nextWord);
levelEl.addEventListener("change", nextWord);

newDaily();
drawLetter();
updateStats();
nextWord();
newVerb();
newSentence();
</script>
